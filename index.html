<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visor Mundial 2026</title>
<meta name="description" content="Stream en vivo del Mundial 2026 con estadisticas de equipos.">
<meta name="author" content="Juan Martinez Garcia">
<style>
:root {
  --bg:#0a0e12; --surface:#111820; --card:#1a2332;
  --text:#dce1e8; --text-dim:#7a8a9e; --text-muted:#4a5a6e;
  --green:#3CAC3B; --blue:#2A398D; --red:#E61D25; --lgray:#D1D4D1; --dgray:#474A4A;
  --radius:6px; --font:system-ui,-apple-system,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:var(--font);color:var(--text);display:flex;flex-direction:column;font-size:13px}

/* ── Agenda Bar ── */
#agenda{
  background:var(--surface);border-bottom:1px solid rgba(255,255,255,.06);
  display:flex;align-items:stretch;height:40px;flex-shrink:0;overflow:hidden;
}
#agenda .brand{
  padding:0 14px;font-weight:700;font-size:12px;color:var(--green);
  display:flex;align-items:center;gap:5px;white-space:nowrap;
  border-right:1px solid rgba(255,255,255,.06);letter-spacing:.4px;
}
#agenda .brand small{color:var(--text-dim);font-weight:400;font-size:10px}
#agendaList{
  display:flex;overflow-x:auto;flex:1;gap:0;
  scrollbar-width:none;-ms-overflow-style:none;
}
#agendaList::-webkit-scrollbar{display:none}
.match-tab{
  flex-shrink:0;padding:0 12px;cursor:pointer;display:flex;align-items:center;
  gap:6px;border-right:1px solid rgba(255,255,255,.04);
  transition:background .12s;white-space:nowrap;font-size:12px;
}
.match-tab:hover{background:rgba(60,172,59,.07)}
.match-tab.active{background:rgba(60,172,59,.12)}
.match-tab.active::after{content:'';position:absolute;bottom:0;left:4px;right:4px;height:2px;background:var(--green);border-radius:2px}
.match-tab .t{color:var(--text-dim);font-size:10px;font-weight:500}
.match-tab .teams{font-weight:500}
.match-tab .live{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green)}
.match-tab .ch{font-size:9px;background:rgba(255,255,255,.08);padding:1px 6px;border-radius:8px;color:var(--text-dim)}
#loadingAgenda{padding:0 14px;display:flex;align-items:center;color:var(--text-muted);font-size:11px;gap:6px}

/* ── Main Layout ── */
#main{flex:1;display:flex;overflow:hidden}
#videoCol{flex:1;display:flex;flex-direction:column;min-width:0;position:relative}
#sideCol{width:335px;flex-shrink:0;overflow-y:auto;background:var(--surface);border-left:1px solid rgba(255,255,255,.06);padding:12px}

/* ── Video ── */
#videoWrap{flex:1;position:relative;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden}
#videoWrap iframe{width:100%;height:100%;border:none;background:#000}
#placeholder{color:var(--text-muted);text-align:center;padding:30px;font-size:13px}
#placeholder strong{display:block;font-size:16px;color:var(--text-dim);margin-bottom:4px}

#controls{
  background:var(--surface);padding:6px 10px;display:flex;align-items:center;gap:6px;
  border-top:1px solid rgba(255,255,255,.06);flex-shrink:0;min-height:36px;
}
#controls .label{font-size:11px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-dim)}
#controls .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
#controls .dot.live{background:var(--green);box-shadow:0 0 5px var(--green)}
#controls .dot.off{background:var(--dgray)}
#controls .dot.loading{background:#f0a500;animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

#chanSel{
  background:var(--card);border:1px solid rgba(255,255,255,.1);
  color:var(--text);padding:4px 8px;border-radius:var(--radius);
  font-size:11px;cursor:pointer;outline:none;min-width:120px;
}
#chanSel:focus{border-color:var(--green)}

/* ── Sidebar ── */
#sideCol .title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--text-muted);margin-bottom:8px}
#sideCol .empty{color:var(--text-muted);text-align:center;padding:30px 0;font-size:12px}
.team-row{display:flex;gap:7px;margin-bottom:10px}
.team-box{flex:1;background:var(--card);border-radius:var(--radius);padding:10px;border:1px solid rgba(255,255,255,.04);min-width:0}
.team-box .hd{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.team-box .flag{font-size:18px}
.team-box .name{font-size:12px;font-weight:600}
.team-box .status{font-size:9px;padding:1px 6px;border-radius:8px;margin-left:auto;font-weight:500}
.team-box .status.in{background:rgba(60,172,59,.15);color:var(--green)}
.team-box .status.out{background:rgba(230,29,37,.15);color:var(--red)}

.sg{display:grid;grid-template-columns:1fr 1fr;gap:1px 8px}
.sr{display:flex;justify-content:space-between;padding:2px 0;font-size:10px;border-bottom:1px solid rgba(255,255,255,.03)}
.sr .k{color:var(--text-muted)}.sr .v{font-weight:500;color:var(--text)}

.form-row{display:flex;gap:2px;margin:4px 0}
.fb{width:18px;height:18px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700}
.fb.w{background:rgba(60,172,59,.25);color:var(--green)}
.fb.d{background:rgba(42,57,141,.25);color:#5b7ae8}
.fb.l{background:rgba(230,29,37,.25);color:var(--red)}

.rbar{height:3px;border-radius:2px;background:rgba(255,255,255,.06);margin:3px 0;overflow:hidden}
.rfill{height:100%;border-radius:2px}
.rfill.g{background:var(--green)}.rfill.a{background:#f0a500}.rfill.b{background:var(--red)}

.mlist{margin-top:5px}
.mi{display:flex;align-items:center;gap:6px;padding:3px 0;font-size:10px;border-bottom:1px solid rgba(255,255,255,.03)}
.mi .mr{width:18px;text-align:center;font-weight:700;font-size:9px;padding:1px 0;border-radius:2px}
.mi .mr.w{color:var(--green)}.mi .mr.l{color:var(--red)}.mi .mr.d{color:#5b7ae8}
.mi .op{flex:1;color:var(--text-dim)}.mi .sc{font-weight:600}

/* ── Credit ── */
#credit{
  position:fixed;bottom:8px;left:10px;z-index:30;
  background:rgba(17,24,32,.8);backdrop-filter:blur(5px);
  border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:3px 12px;
}
#credit a{color:var(--text-dim);text-decoration:none;font-size:9px;display:flex;align-items:center;gap:4px}
#credit a:hover{color:var(--text)}
#credit .d{display:flex;gap:2px}
#credit .d s{width:3px;height:3px;border-radius:50%}
#credit .d .g{background:var(--green)}#credit .d .b{background:var(--blue)}#credit .d .r{background:var(--red)}

/* ── Toast ── */
#toast{position:fixed;bottom:50%;left:50%;transform:translate(-50%,50%);
  background:rgba(0,0,0,.85);border:1px solid #2a2a2a;padding:6px 14px;
  border-radius:20px;font-size:11px;z-index:100;pointer-events:none;display:none}
#toast.show{animation:ti .3s ease-out,to .3s 1.4s ease-in forwards}
@keyframes ti{from{opacity:0;transform:translate(-50%,50%) translateY(8px)}to{opacity:1;transform:translate(-50%,50%) translateY(0)}}
@keyframes to{from{opacity:1}to{opacity:0}}

#sideCol::-webkit-scrollbar{width:3px}
#sideCol::-webkit-scrollbar-track{background:transparent}
#sideCol::-webkit-scrollbar-thumb{background:var(--dgray);border-radius:2px}

@media(max-width:750px){
  #main{flex-direction:column}
  #sideCol{width:100%;max-height:40%;border-left:none;border-top:1px solid rgba(255,255,255,.06)}
  #agenda{height:auto;flex-wrap:wrap}
}

.btn{
  background:transparent;border:1px solid rgba(255,255,255,.1);
  color:var(--text-dim);border-radius:var(--radius);
  cursor:pointer;font-size:11px;padding:4px 8px;transition:all .1s;
}
.btn:hover{background:rgba(255,255,255,.08);color:var(--text)}
</style>
</head>
<body>

<div id="agenda">
  <div class="brand">Visor <small>Mundial 2026</small></div>
  <div id="agendaList"></div>
  <div id="loadingAgenda">Cargando...</div>
</div>

<div id="main">
  <div id="videoCol">
    <div id="videoWrap">
      <div id="placeholder">
        <strong>Selecciona un partido</strong>
        Elegi de la agenda arriba el partido que queres ver
      </div>
      <iframe id="streamFrame" allow="autoplay; fullscreen" allowfullscreen style="display:none"></iframe>
    </div>
    <div id="controls">
      <span class="dot off" id="statusDot"></span>
      <span class="label" id="matchLabel">Ningun partido seleccionado</span>
      <select id="chanSel" style="display:none" onchange="pickChannel(this.value)"></select>
      <button class="btn" id="fsBtn" style="display:none" onclick="fullscreen()">⛶</button>
    </div>
  </div>
  <div id="sideCol">
    <div id="teamInfo"><div class="empty">Selecciona un partido para ver estadisticas</div></div>
  </div>
</div>

<div id="credit">
  <a href="https://juanmartinezgarcia.com" target="_blank">
    <span class="d"><s class="g"></s><s class="b"></s><s class="r"></s></span>
    Juan Martinez Garcia
  </a>
</div>
<div id="toast"></div>

<script>
let data = null, selectedIdx = -1, activeChan = null;
let busy = false, loadTimer = null;

(async function init() {
  try {
    const r = await fetch('./data.json?_=' + Date.now());
    data = await r.json();
    document.getElementById('loadingAgenda').remove();
    renderAgenda();
    // Check URL hash for auto-select
    const idx = parseInt(location.hash.replace('#',''));
    if (!isNaN(idx) && data.matches[idx]) selectMatch(idx);
  } catch(e) {
    document.getElementById('loadingAgenda').textContent = 'Error al cargar datos';
    console.error(e);
  }
})();

function renderAgenda() {
  const list = document.getElementById('agendaList');
  list.innerHTML = data.matches.map((m, i) => {
    const now = new Date();
    const [h, mi] = (m.time||'0:0').split(':').map(Number);
    const mt = new Date(now); mt.setHours(h, mi, 0, 0);
    const live = (now - mt) > -3600000 && (now - mt) < 9000000;
    return `<div class="match-tab${selectedIdx===i?' active':''}" onclick="selectMatch(${i})">
      ${live?'<span class="live"></span>':''}
      <span class="teams">${m.homeTeam} vs ${m.awayTeam}</span>
      <span class="t">${m.time}</span>
      ${m.channels.length ? `<span class="ch">${m.channels.length}</span>` : ''}
    </div>`;
  }).join('');
}

function selectMatch(idx) {
  selectedIdx = idx;
  const m = data.matches[idx];
  if (!m) return;
  location.hash = idx;

  // Highlight
  document.querySelectorAll('.match-tab').forEach((el, i) => el.classList.toggle('active', i===idx));

  // Sidebar
  renderTeams(m);

  // Channel selector
  const sel = document.getElementById('chanSel');
  const fs = document.getElementById('fsBtn');
  const label = document.getElementById('matchLabel');
  label.textContent = `${m.homeTeam} vs ${m.awayTeam} — ${m.time}`;

  if (m.channels.length) {
    sel.style.display = ''; fs.style.display = '';
    sel.innerHTML = '<option value="">Canal...</option>' +
      m.channels.map((c, ci) => `<option value="${ci}">${c.name} (${c.quality.replace('Calidad ','')})</option>`).join('');
    sel.value = '';

    // Auto-pick first HD
    const hd = m.channels.findIndex(c => c.quality.includes('1080'));
    if (hd >= 0) { sel.value = hd; pickChannel(hd); }
  } else {
    sel.style.display = 'none'; fs.style.display = 'none';
    stopStream();
    toast('Sin canales disponibles aun');
  }
}

function pickChannel(ci) {
  if (ci === '') { stopStream(); return; }
  const m = data.matches[selectedIdx];
  if (!m || !m.channels[ci]) return;
  const ch = m.channels[ci];
  activeChan = ci;

  document.getElementById('matchLabel').textContent = `${m.homeTeam} vs ${m.awayTeam} — ${ch.name}`;
  const frame = document.getElementById('streamFrame');
  const placeholder = document.getElementById('placeholder');
  const dot = document.getElementById('statusDot');

  placeholder.style.display = 'none';
  frame.style.display = '';
  dot.className = 'dot loading';
  frame.src = '';

  // Try streamUrl first (decoded base64 → direct stream page), fallback to eventosUrl
  const src = ch.streamUrl || ch.eventosUrl;
  setTimeout(() => { frame.src = src; }, 100);

  frame.onload = () => { dot.className = 'dot live'; };
  clearTimeout(loadTimer);
  loadTimer = setTimeout(() => {
    if (dot.className === 'dot loading') dot.className = 'dot off';
  }, 15000);
}

function stopStream() {
  const frame = document.getElementById('streamFrame');
  frame.src = ''; frame.style.display = 'none';
  document.getElementById('placeholder').style.display = '';
  document.getElementById('statusDot').className = 'dot off';
  document.getElementById('chanSel').value = '';
  activeChan = null;
}

function fullscreen() {
  const f = document.getElementById('streamFrame');
  if (f.requestFullscreen) f.requestFullscreen().catch(()=>{});
}

// ── Team Info ──
function renderTeams(m) {
  const el = document.getElementById('teamInfo');
  if (!m.homeData && !m.awayData) {
    el.innerHTML = `<div class="title">Equipos</div><div class="empty">Sin datos de equipos disponibles</div>`;
    return;
  }

  const card = (name, d) => {
    if (!d) return `<div class="team-box"><div class="name">${name}</div><div style="color:var(--text-muted);font-size:10px;padding-top:4px">Sin datos</div></div>`;

    const form = d.form ? d.form.map(f => {
      const c = (f==='V'||f==='W')?'w':(f==='E'||f==='D')?'d':'l';
      const l = {V:'V',W:'W',E:'E',D:'E',l:'D',L:'D'}[f]||f;
      return `<span class="fb ${c}">${l}</span>`;
    }).join('') : '';

    const matches = d.matches_detail ? d.matches_detail.slice(-5).map(md => {
      const c = md.result==='w'||md.result==='W'?'w':md.result==='l'||md.result==='L'?'l':'d';
      const l = c==='w'?'G':c==='l'?'P':'E';
      return `<div class="mi"><span class="mr ${c}">${l}</span><span class="op">${md.opponent}</span><span class="sc">${md.score}</span></div>`;
    }).join('') : '';

    const rv = d.rating||0;
    const rc = rv>=80?'g':rv>=60?'a':'b';

    return `<div class="team-box">
      <div class="hd"><span class="flag">${d.flag||''}</span><span class="name">${name}</span><span class="status ${d.status==='Clasificado'?'in':'out'}">${d.status||'-'}</span></div>
      <div class="sg">
        <div class="sr"><span class="k">FIFA Rank</span><span class="v">#${d.fifa_rank||'-'}</span></div>
        <div class="sr"><span class="k">Grupo</span><span class="v">${d.group||'-'} (${d.pos||'-'})</span></div>
        <div class="sr"><span class="k">Puntos</span><span class="v">${d.pts??'-'}</span></div>
        <div class="sr"><span class="k">Dif. gol</span><span class="v">${d.dg??'-'}</span></div>
        <div class="sr"><span class="k">Jugados</span><span class="v">${d.played??'-'}</span></div>
        <div class="sr"><span class="k">Mundiales</span><span class="v">${d.apps||'-'}</span></div>
      </div>
      ${d.best ? `<div class="sr" style="margin-top:3px"><span class="k">Mejor resultado</span><span class="v">${d.best}</span></div>` : ''}
      <div style="font-size:9px;color:var(--text-muted);margin-top:5px;margin-bottom:1px">Valoracion: ${rv}/100</div>
      <div class="rbar"><div class="rfill ${rc}" style="width:${rv}%"></div></div>
      ${form ? `<div style="font-size:9px;color:var(--text-muted);margin-top:5px">Forma</div><div class="form-row">${form}</div>` : ''}
      ${matches ? `<div style="font-size:9px;color:var(--text-muted);margin-top:5px">Ultimos partidos</div><div class="mlist">${matches}</div>` : ''}
    </div>`;
  };

  el.innerHTML = `<div class="title">Estadisticas de equipos</div>
    <div class="team-row">${card(m.homeTeam, m.homeData)}${card(m.awayTeam, m.awayData)}</div>`;
}

// ── Toast ──
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'show';
  setTimeout(() => t.className = '', 2000);
}

// ── Keyboard ──
document.addEventListener('keydown', e => {
  if (e.target.tagName==='SELECT') return;
  if (e.key==='f'||e.key==='F') { e.preventDefault(); fullscreen(); }
  if (e.key==='Escape') { e.preventDefault(); stopStream(); }
});
</script>
</body>
</html>
